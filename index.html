<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animon: Resonance</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <!-- Main Game Canvas -->
        <canvas id="game-canvas" width="640" height="480"></canvas>
        
        <!-- CRT Screen Effect Overlay -->
        <div id="crt-overlay"></div>

        <!-- UI Overlays -->
        <div id="ui-layer">
            <!-- Dialog Box -->
            <div id="dialog-box" class="hidden">
                <div id="dialog-name"></div>
                <div id="dialog-text"></div>
                <div id="dialog-indicator">▼</div>
            </div>

            <!-- Start Menu / Character Customization -->
            <div id="start-menu" class="menu-panel">
                <h1>Animon: Resonance</h1>
                <p>Pressione ENTER para começar</p>
                <div id="character-creation" class="hidden">
                    <h2>Crie seu Herói</h2>
                    <label>Nome: <input type="text" id="char-name" value="Leo" maxlength="10"></label>
                    <label>Cor da Roupa: 
                        <select id="char-color">
                            <option value="red">Vermelho</option>
                            <option value="blue">Azul</option>
                            <option value="green">Verde</option>
                        </select>
                    </label>
                    <button id="btn-start-game">Iniciar Jornada</button>
                </div>
            </div>

            <!-- In-game Pause Menu -->
            <div id="pause-menu" class="menu-panel hidden">
                <h2>Menu</h2>
                <button onclick="GameUI.openParty()">Equipe</button>
                <button onclick="GameUI.openBag()">Mochila</button>
                <button onclick="GameUI.openMap()">Mapa</button>
                <button onclick="Game.saveGame()">Salvar Jogo</button>
                <button onclick="GameUI.closePauseMenu()">Voltar</button>
            </div>

            <!-- Party Screen -->
            <div id="party-screen" class="menu-panel hidden">
                <h2>Equipe Animon</h2>
                <div id="party-list"></div>
                <button onclick="GameUI.closeSubMenu()">Voltar</button>
            </div>

            <!-- Bag Screen -->
            <div id="bag-screen" class="menu-panel hidden">
                <h2>Mochila</h2>
                <div id="bag-list"></div>
                <button onclick="GameUI.closeSubMenu()">Voltar</button>
            </div>

            <!-- Battle HUD -->
            <div id="battle-hud" class="hidden">
                <div id="enemy-status" class="status-box">
                    <span id="enemy-name">Animon Selvagem</span>
                    <span id="enemy-level">Lv 1</span>
                    <div class="hp-bar-bg"><div id="enemy-hp-bar" class="hp-bar-fill"></div></div>
                </div>
                <div id="player-status" class="status-box">
                    <span id="player-animon-name">Meu Animon</span>
                    <span id="player-animon-level">Lv 1</span>
                    <div class="hp-bar-bg"><div id="player-hp-bar" class="hp-bar-fill"></div></div>
                    <span id="player-hp-text">20/20</span>
                </div>
                <div id="battle-menu">
                    <div id="battle-message">Um Animon selvagem apareceu!</div>
                    <div id="battle-actions" class="hidden">
                        <button onclick="Battle.showMoves()">Lutar</button>
                        <button onclick="Battle.showBag()">Mochila</button>
                        <button onclick="Battle.switchAnimon()">Equipe</button>
                        <button onclick="Battle.runAway()">Fugir</button>
                    </div>
                    <div id="battle-moves" class="hidden">
                        <!-- Moves injected here -->
                    </div>
                </div>
            </div>
            
            <!-- Evolution Screen -->
            <div id="evolution-screen" class="menu-panel hidden">
                <h2 id="evolution-text">Opa! Seu Animon está evoluindo!</h2>
                <canvas id="evolution-canvas" width="300" height="300"></canvas>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/audio.js"></script>
    <script src="js/creatures.js"></script>
    <script src="js/player.js"></script>
    <script src="js/world.js"></script>
    <script src="js/battle.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
