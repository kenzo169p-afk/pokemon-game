<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animon Resonance</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <!-- Main Game Canvas (480x320 - GBA 3:2 Ratio) -->
        <canvas id="game-canvas" width="480" height="320"></canvas>
        
        <!-- UI Overlays -->
        <div id="ui-layer">
            
            <!-- Dialog Box (Classic Style) -->
            <div id="dialog-box" class="hidden">
                <div id="dialog-text"></div>
                <div id="dialog-indicator">▼</div>
            </div>

            <!-- Start Menu / Title Screen -->
            <div id="start-menu" class="menu-panel">
                <h1>ANIMON RESONANCE</h1>
                <p>Pressione ENTER para começar</p>
                <div id="character-creation" class="hidden">
                    <p>Qual o seu nome?</p>
                    <input type="text" id="char-name" value="Leo" maxlength="10">
                    <button id="btn-start-game">Iniciar</button>
                </div>
            </div>

            <!-- In-game Start Menu (Right Side) -->
            <div id="ingame-menu" class="hidden">
                <button onclick="GameUI.openParty()">Animon</button>
                <button onclick="GameUI.openBag()">Mochila</button>
                <button onclick="GameUI.openProfile()">Perfil</button>
                <button onclick="Game.saveGame()">Salvar</button>
                <button onclick="GameUI.closeIngameMenu()">Sair</button>
            </div>

            <!-- Party Screen -->
            <div id="party-screen" class="full-menu hidden">
                <h2>Equipe</h2>
                <div id="party-list"></div>
                <button class="back-btn" onclick="GameUI.closeSubMenu()">VOLTAR</button>
            </div>

            <!-- Bag Screen -->
            <div id="bag-screen" class="full-menu hidden">
                <h2>Mochila</h2>
                <div id="bag-list"></div>
                <button class="back-btn" onclick="GameUI.closeSubMenu()">VOLTAR</button>
            </div>
            
            <!-- Profile Screen -->
            <div id="profile-screen" class="full-menu hidden">
                <h2>Cartão de Treinador</h2>
                <div id="profile-info"></div>
                <button class="back-btn" onclick="GameUI.closeSubMenu()">VOLTAR</button>
            </div>

            <!-- Battle HUD -->
            <div id="battle-hud" class="hidden">
                <!-- Transition Flash Effect -->
                <div id="battle-flash" class="hidden"></div>
                
                <div id="enemy-status" class="status-box">
                    <div class="status-top">
                        <span id="enemy-name">Animon</span>
                        <span id="enemy-level">Lv1</span>
                    </div>
                    <div class="hp-bar-bg"><div id="enemy-hp-bar" class="hp-bar-fill"></div></div>
                </div>
                
                <div id="player-status" class="status-box">
                    <div class="status-top">
                        <span id="player-animon-name">Meu Animon</span>
                        <span id="player-animon-level">Lv1</span>
                    </div>
                    <div class="hp-bar-bg"><div id="player-hp-bar" class="hp-bar-fill"></div></div>
                    <div class="hp-text"><span id="player-hp-text">20/20</span></div>
                </div>
                
                <div id="battle-bottom">
                    <div id="battle-message-box">
                        <span id="battle-message">Um selvagem apareceu!</span>
                    </div>
                    
                    <div id="battle-command-box" class="hidden">
                        <div class="cmd-row">
                            <button onclick="Battle.showMoves()">Lutar</button>
                            <button onclick="Battle.showBag()">Mochila</button>
                        </div>
                        <div class="cmd-row">
                            <button onclick="Battle.switchAnimon()">Animon</button>
                            <button onclick="Battle.runAway()">Fugir</button>
                        </div>
                    </div>
                    
                    <div id="battle-moves-box" class="hidden">
                        <div id="moves-grid"></div>
                        <div id="move-details">
                            PP <span id="move-pp">--/--</span><br>
                            TIPO/<span id="move-type">---</span>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/sprites.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/creatures.js"></script>
    <script src="js/player.js"></script>
    <script src="js/world.js"></script>
    <script src="js/battle.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
